{% extends "base.html" %}

{% block title %}测验问题 - {{ block.Super }}{% endblock %}

{% block content %}
<div class="quiz-container">
    <h2>问题 {{ question.id }}</h2>
    <p>{{ question.content }}</p>
    {% if question.images %}
    <img src="{{ question.images }}" alt="问题图片" class="question-image">
    {% endif %}
    <form action="/submit" method="post">
        <input type="hidden" name="question_id" value="{{ question.id }}">
        {% for option in question.options %}
        <div class="option">
            <input type="radio" id="option{{ forloop.Counter }}" name="answer" value="{{ option.value }}">
            <label for="option{{ forloop.Counter }}">{{ option.text }}</label>
        </div>
        {% endfor %}
        <button type="submit" class="submit-btn">提交答案</button>
    </form>
</div>
{% endblock %}
